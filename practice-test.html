<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Practice Test | TIH Learning Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="courses-db.js?v=6"></script>
  <script src="hub-config.js?v=3"></script>
  <script src="hub-cloud.js?v=5"></script>
  <script src="hub-db.js?v=12"></script>
  <script src="paywall.js?v=2"></script>
  <script src="practice-tests.js?v=1"></script>
  <style>
    :root{
      --navy:#002868; --navy-2:#1e3a8a; --orange:#F97316; --red:#BF0A30;
      --good:#0B7A54; --bg:#F4F6FB; --card:#fff; --text:#1F2937; --muted:#64748b;
      --border:#e2e8f0; --radius:14px; --shadow:0 4px 18px rgba(0,40,104,.08);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;}
    h1,h2,h3{font-family:'Poppins',sans-serif;}
    button{font-family:inherit;cursor:pointer;}
    .topbar{background:var(--navy);color:#fff;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:40;}
    .topbar .brand{font-family:'Poppins',sans-serif;font-weight:800;font-size:.95rem;}
    .topbar .brand span{color:var(--orange);}
    .timer{font-weight:800;font-variant-numeric:tabular-nums;background:rgba(255,255,255,.12);padding:.3rem .7rem;border-radius:999px;font-size:.95rem;display:none;}
    .timer.low{background:var(--red);}
    .wrap{max-width:820px;margin:0 auto;padding:1.4rem 1rem 4rem;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.5rem;margin-bottom:1.1rem;}
    .eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);}
    h1.title{font-size:clamp(1.4rem,4vw,2rem);color:var(--navy);margin:.3rem 0 .6rem;}
    .lead{color:var(--muted);font-size:.95rem;margin-bottom:1rem;}
    .meta-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem;}
    .chip{font-size:.78rem;font-weight:700;background:#eef2fb;color:var(--navy);border-radius:999px;padding:.35rem .8rem;}
    .chip.best{background:#dcfce7;color:var(--good);}
    .btn{border:none;border-radius:999px;font-weight:800;font-family:'Poppins',sans-serif;padding:.85rem 1.5rem;font-size:.98rem;min-height:50px;transition:opacity .15s,transform .1s;}
    .btn:active{transform:translateY(1px);}
    .btn-primary{background:var(--orange);color:#fff;}
    .btn-navy{background:var(--navy);color:#fff;}
    .btn-line{background:#fff;border:1.5px solid var(--border);color:var(--text);}
    .btn:hover{opacity:.92;}
    .hidden{display:none !important;}

    /* NAVIGATOR */
    .nav-grid{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem;}
    .nav-cell{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-weight:700;font-size:.8rem;color:var(--muted);display:flex;align-items:center;justify-content:center;}
    .nav-cell.answered{background:var(--navy);color:#fff;border-color:var(--navy);}
    .nav-cell.flagged{border-color:var(--orange);color:var(--orange);box-shadow:0 0 0 2px rgba(249,115,22,.25);}
    .nav-cell.current{outline:3px solid var(--orange);outline-offset:1px;}

    .sec-label{font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--orange);margin-bottom:.5rem;}
    .q-num{font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:.3rem;}
    .q-text{font-size:1.05rem;font-weight:600;color:#111827;margin-bottom:1.1rem;line-height:1.5;white-space:pre-wrap;}
    .opt{display:flex;align-items:flex-start;gap:.7rem;border:1.5px solid var(--border);border-radius:10px;padding:.8rem .9rem;margin-bottom:.55rem;background:#fff;text-align:left;width:100%;font-size:.95rem;color:var(--text);}
    .opt:hover{border-color:var(--navy);background:#f6f9ff;}
    .opt.chosen{border-color:var(--navy);background:#eef2fb;font-weight:600;}
    .opt .letter{flex:none;width:24px;height:24px;border-radius:50%;background:#eef2fb;color:var(--navy);font-weight:800;font-size:.8rem;display:flex;align-items:center;justify-content:center;}
    .opt.chosen .letter{background:var(--navy);color:#fff;}
    .q-actions{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-top:1.1rem;flex-wrap:wrap;}
    .flag-btn{background:none;border:1.5px solid var(--border);border-radius:999px;padding:.5rem 1rem;font-weight:700;font-size:.82rem;color:var(--muted);min-height:42px;}
    .flag-btn.on{border-color:var(--orange);color:var(--orange);background:#fff7ed;}
    .nav-btns{display:flex;gap:.5rem;}
    .btn-sm{padding:.55rem 1.1rem;min-height:42px;font-size:.88rem;border-radius:999px;}

    /* RESULTS */
    .score-hero{text-align:center;padding:1.5rem 1rem;border-radius:var(--radius);background:linear-gradient(135deg,#001a45,#002868);color:#fff;margin-bottom:1.2rem;}
    .score-hero .big{font-family:'Poppins',sans-serif;font-weight:800;font-size:3rem;line-height:1;}
    .score-hero .lbl{font-size:.85rem;color:rgba(255,255,255,.8);margin-top:.4rem;}
    .breakdown{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.2rem;}
    @media(max-width:520px){.breakdown{grid-template-columns:1fr;}}
    .bd-cell{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:.8rem;text-align:center;}
    .bd-cell b{display:block;font-family:'Poppins',sans-serif;font-size:1.3rem;color:var(--navy);}
    .bd-cell span{font-size:.75rem;color:var(--muted);font-weight:700;}
    .review-item{border:1px solid var(--border);border-radius:10px;padding:.9rem;margin-bottom:.7rem;}
    .review-item .rq{font-weight:600;font-size:.92rem;margin-bottom:.5rem;}
    .review-line{font-size:.85rem;margin:.2rem 0;}
    .review-line.correct{color:var(--good);font-weight:700;}
    .review-line.wrong{color:var(--red);font-weight:700;}
    .exp{font-size:.83rem;color:#374151;background:#f0f9ff;border-left:3px solid var(--navy-2);padding:.5rem .7rem;border-radius:0 8px 8px 0;margin-top:.5rem;}

    /* WRITING / SPEAKING */
    .prompt-box{border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.8rem;}
    .prompt-box .p-q{font-weight:600;font-size:.95rem;margin-bottom:.5rem;white-space:pre-wrap;}
    .prompt-box .tips{font-size:.82rem;color:var(--muted);margin-bottom:.6rem;}
    .check{font-size:.85rem;margin:.2rem 0;padding-left:1.3rem;position:relative;}
    .check::before{content:'✓';position:absolute;left:0;color:var(--good);font-weight:800;}
    .reveal-btn{background:#eef2fb;color:var(--navy);border:none;border-radius:8px;padding:.5rem .9rem;font-weight:700;font-size:.83rem;margin-top:.5rem;}
    .model{display:none;margin-top:.7rem;background:#f8fafc;border:1px dashed var(--border);border-radius:8px;padding:.9rem;font-size:.9rem;white-space:pre-wrap;color:#374151;line-height:1.6;}
    .model.show{display:block;}
    .footer-actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.5rem;}
  </style>
</head>
<body>
  <div class="topbar">
    <a href="hub-dashboard.html" class="brand" style="color:#fff;text-decoration:none;">TIH <span>Learning Hub</span></a>
    <div style="display:flex;align-items:center;gap:.7rem;">
      <span class="timer" id="timer">00:00</span>
      <button class="btn btn-primary btn-sm hidden" id="submitBtn" style="min-height:40px;">Submit Test</button>
    </div>
  </div>

  <div class="wrap">
    <!-- INTRO -->
    <div id="introView">
      <div class="card">
        <p class="eyebrow" id="examEyebrow">Practice Test</p>
        <h1 class="title" id="examTitle">Loading…</h1>
        <p class="lead" id="examIntro"></p>
        <div class="meta-row" id="metaRow"></div>
        <button class="btn btn-primary" id="startBtn">▶ Start Timed Test</button>
      </div>
      <div class="card" id="extrasIntro"></div>
    </div>

    <!-- TEST -->
    <div id="testView" class="hidden">
      <div class="card">
        <div class="nav-grid" id="navGrid"></div>
        <div id="qCard"></div>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="resultView" class="hidden">
      <div class="score-hero">
        <div class="big" id="scoreBig">–</div>
        <div class="lbl" id="scoreLbl"></div>
      </div>
      <div class="card">
        <h3 style="color:var(--navy);margin-bottom:.8rem;">Your Breakdown</h3>
        <div class="breakdown" id="breakdown"></div>
        <p id="scoreMsg" style="font-size:.9rem;color:var(--muted);"></p>
        <div class="footer-actions">
          <button class="btn btn-navy btn-sm" id="retakeBtn">↻ Retake Test</button>
          <a class="btn btn-line btn-sm" id="backCourseBtn" href="#" style="display:inline-flex;align-items:center;text-decoration:none;">← Back to Course</a>
        </div>
      </div>
      <div class="card">
        <h3 style="color:var(--navy);margin-bottom:.8rem;">Answer Review</h3>
        <div id="reviewList"></div>
      </div>
      <div class="card" id="extrasResult"></div>
    </div>
  </div>

  <script>
    function getUrlParam(name){ var m=new RegExp('[?&]'+name+'=([^&]*)').exec(window.location.search); return m?decodeURIComponent(m[1].replace(/\+/g,' ')):null; }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    var exam = (getUrlParam('exam')||'ielts').toLowerCase();
    var T = (typeof PRACTICE_TESTS!=='undefined') ? PRACTICE_TESTS[exam] : null;
    var courseTitle = (typeof COURSES_DB!=='undefined' && COURSES_DB[exam]) ? COURSES_DB[exam].title : (T?T.title:'Practice Test');

    // State (declared BEFORE init so the initializer never resets a populated test).
    var flat=[], answers={}, flags={}, current=0, timerInt=null, remaining=0, submitted=false;

    if(!T){ document.getElementById('examTitle').textContent='Practice test not found.'; }
    else {
      // ---- PAYWALL: only students who unlocked the course may practise ----
      if(typeof HubDB!=='undefined' && !HubDB.hasAccess(exam)){
        if(typeof Paywall!=='undefined'){ Paywall.require({ itemId: exam, itemTitle: courseTitle.split(':')[0] + ' — Practice Test' }); }
      }
      if(typeof HubDB==='undefined' || HubDB.hasAccess(exam)){ initPractice(); }
    }

    // Shuffle a question's answer options so the correct one isn't always in the
    // same position. Returns {opts, correct} with the answer remapped. Options that
    // reference a position ("all of the above", "A and B") keep their order.
    var PT_POS_DEP = /\b(all|none|both|any|each) of the (above|following)\b|\bthe above\b|\b(all|none) of these\b|\bboth [a-d] (and|&) [a-d]\b|\b[a-d] (and|or|&) [a-d]\b|\banswers? [a-d]\b|\boptions? [a-d]\b/i;
    function shuffleQ(qq){
      var opts=(qq.opts||[]).slice();
      var positional=opts.some(function(o){ return PT_POS_DEP.test(String(o)); });
      if(positional || opts.length<2) return { opts:opts, correct:qq.correct };
      var idxs=opts.map(function(_,i){ return i; });
      for(var i=idxs.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=idxs[i]; idxs[i]=idxs[j]; idxs[j]=t; }
      return { opts:idxs.map(function(o){ return opts[o]; }), correct:idxs.indexOf(qq.correct) };
    }

    function initPractice(){
      document.getElementById('examEyebrow').textContent = courseTitle.split(':')[0] + ' · Practice Test';
      document.getElementById('examTitle').textContent = T.title;
      document.getElementById('examIntro').textContent = T.intro;
      // flatten MCQ
      flat=[];
      (T.sections||[]).forEach(function(sec){ (sec.questions||[]).forEach(function(qq){ var sh=shuffleQ(qq); flat.push({section:sec.name,q:qq.q,opts:sh.opts,correct:sh.correct,exp:qq.exp}); }); });
      document.getElementById('backCourseBtn').href='course-player.html?id='+encodeURIComponent(exam);
      // meta chips
      var mr=document.getElementById('metaRow');
      mr.innerHTML = '<span class="chip">⏱ '+T.durationMin+' minutes</span>'
        + '<span class="chip">📝 '+flat.length+' questions</span>'
        + '<span class="chip">🎯 Auto-scored + review</span>';
      var best=null; try{ best=JSON.parse(localStorage.getItem('tih_practice_best_'+exam)); }catch(e){}
      if(best && best.display){ mr.innerHTML += '<span class="chip best">🏆 Best: '+esc(best.display)+'</span>'; }
      renderExtras(document.getElementById('extrasIntro'));
      document.getElementById('startBtn').addEventListener('click', startTest);
      document.getElementById('submitBtn').addEventListener('click', function(){ if(confirm('Submit your test now? You cannot change answers after submitting.')) finishTest(); });
      document.getElementById('retakeBtn').addEventListener('click', function(){ location.reload(); });
    }

    function startTest(){
      document.getElementById('introView').classList.add('hidden');
      document.getElementById('testView').classList.remove('hidden');
      document.getElementById('submitBtn').classList.remove('hidden');
      document.getElementById('timer').style.display='inline-block';
      remaining = T.durationMin*60;
      updateTimer();
      timerInt = setInterval(function(){ remaining--; updateTimer(); if(remaining<=0){ clearInterval(timerInt); finishTest(); } }, 1000);
      renderNav(); renderQuestion();
      window.scrollTo(0,0);
    }
    function updateTimer(){
      var m=Math.floor(remaining/60), s=remaining%60;
      var el=document.getElementById('timer');
      el.textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
      el.classList.toggle('low', remaining<=60);
    }
    function renderNav(){
      var g=document.getElementById('navGrid'); var h='';
      for(var i=0;i<flat.length;i++){
        var cls='nav-cell'; if(i===current)cls+=' current'; if(answers.hasOwnProperty(i))cls+=' answered'; if(flags[i])cls+=' flagged';
        h+='<button class="'+cls+'" onclick="goTo('+i+')">'+(i+1)+'</button>';
      }
      g.innerHTML=h;
    }
    window.goTo=function(i){ current=i; renderNav(); renderQuestion(); window.scrollTo(0,0); };
    function renderQuestion(){
      var it=flat[current]; var letters=['A','B','C','D','E'];
      var h='<div class="sec-label">'+esc(it.section)+'</div>'
        + '<div class="q-num">Question '+(current+1)+' of '+flat.length+'</div>'
        + '<div class="q-text">'+esc(it.q)+'</div>';
      it.opts.forEach(function(o,idx){
        var chosen = answers[current]===idx;
        h+='<button class="opt'+(chosen?' chosen':'')+'" onclick="choose('+idx+')"><span class="letter">'+letters[idx]+'</span><span>'+esc(o)+'</span></button>';
      });
      h+='<div class="q-actions">'
        + '<button class="flag-btn'+(flags[current]?' on':'')+'" onclick="toggleFlag()">'+(flags[current]?'🚩 Flagged':'⚑ Flag for review')+'</button>'
        + '<div class="nav-btns">'
        + '<button class="btn btn-line btn-sm" onclick="prevQ()"'+(current===0?' disabled style=\"opacity:.5;\"':'')+'>← Prev</button>'
        + (current===flat.length-1
            ? '<button class="btn btn-primary btn-sm" onclick="document.getElementById(\'submitBtn\').click()">Finish ✓</button>'
            : '<button class="btn btn-navy btn-sm" onclick="nextQ()">Next →</button>')
        + '</div></div>';
      document.getElementById('qCard').innerHTML=h;
    }
    window.choose=function(idx){ answers[current]=idx; renderNav(); renderQuestion(); };
    window.toggleFlag=function(){ flags[current]=!flags[current]; renderNav(); renderQuestion(); };
    window.nextQ=function(){ if(current<flat.length-1){ current++; renderNav(); renderQuestion(); window.scrollTo(0,0);} };
    window.prevQ=function(){ if(current>0){ current--; renderNav(); renderQuestion(); window.scrollTo(0,0);} };

    function finishTest(){
      if(submitted) return; submitted=true;
      if(timerInt) clearInterval(timerInt);
      document.getElementById('timer').style.display='none';
      document.getElementById('submitBtn').classList.add('hidden');
      // score
      var total=flat.length, correct=0;
      var perSection={};
      flat.forEach(function(it,i){
        perSection[it.section]=perSection[it.section]||{c:0,t:0};
        perSection[it.section].t++;
        if(answers[i]===it.correct){ correct++; perSection[it.section].c++; }
      });
      var pct = total? (correct/total*100) : 0;
      var conv = convertScore(pct, perSection);

      document.getElementById('scoreBig').textContent = conv.big;
      document.getElementById('scoreLbl').textContent = conv.label + ' · ' + correct + '/' + total + ' correct ('+Math.round(pct)+'%)';
      // breakdown
      var bd=document.getElementById('breakdown'); var bh='';
      conv.breakdown.forEach(function(b){ bh+='<div class="bd-cell"><b>'+esc(b.value)+'</b><span>'+esc(b.label)+'</span></div>'; });
      bd.innerHTML=bh;
      var passed = pct >= (T.passMark||60);
      document.getElementById('scoreMsg').innerHTML = passed
        ? '✅ Great work — you are on track. Review the explanations below to push your score even higher, then retake to beat your best.'
        : 'Keep going — review every explanation below, revisit the lessons, and retake the test. Consistent practice is how scores rise.';
      // review
      var rl=document.getElementById('reviewList'); var rh=''; var letters=['A','B','C','D','E'];
      flat.forEach(function(it,i){
        var chosen = answers.hasOwnProperty(i)?answers[i]:null;
        var right = it.correct;
        var ok = chosen===right;
        rh+='<div class="review-item"><div class="rq">'+(i+1)+'. '+esc(it.q)+'</div>';
        rh+='<div class="review-line '+(ok?'correct':'wrong')+'">Your answer: '+(chosen===null?'(blank)':letters[chosen]+'. '+esc(it.opts[chosen]))+' '+(ok?'✓':'✗')+'</div>';
        if(!ok){ rh+='<div class="review-line correct">Correct: '+letters[right]+'. '+esc(it.opts[right])+'</div>'; }
        rh+='<div class="exp">'+esc(it.exp)+'</div></div>';
      });
      rl.innerHTML=rh;
      renderExtras(document.getElementById('extrasResult'));

      // save best + push activity
      saveBest(conv, pct);
      pushActivity(conv, pct);

      document.getElementById('testView').classList.add('hidden');
      document.getElementById('introView').classList.add('hidden');
      document.getElementById('resultView').classList.remove('hidden');
      window.scrollTo(0,0);
    }

    function convertScore(pct, perSection){
      if(T.scoreType==='band'){
        var band=ieltsBand(pct);
        var bd=[{label:'Estimated Band',value:band.toFixed(1)}];
        Object.keys(perSection).forEach(function(k){ var p=perSection[k].c/perSection[k].t*100; bd.push({label:k,value:ieltsBand(p).toFixed(1)}); });
        return { big:'Band '+band.toFixed(1), label:'Estimated IELTS band', breakdown:bd };
      }
      if(T.scoreType==='toefl120'){
        var tot=Math.round(pct/100*120);
        var bd2=[{label:'Estimated Total (0–120)',value:String(tot)}];
        Object.keys(perSection).forEach(function(k){ var p=perSection[k].c/perSection[k].t*100; bd2.push({label:k,value:String(Math.round(p/100*30))+'/30'}); });
        return { big:String(tot), label:'Estimated TOEFL iBT score (of 120)', breakdown:bd2 };
      }
      // sat1600 — two areas each 200–800
      var areaScore={}; Object.keys(perSection).forEach(function(k){ var p=perSection[k].c/perSection[k].t*100; areaScore[k]=200+Math.round(p/100*600); });
      var totalSat=0, n=0; Object.keys(areaScore).forEach(function(k){ totalSat+=areaScore[k]; n++; });
      // scale to 400-1600 regardless of number of areas
      var satTotal = n? Math.round(400 + (pct/100)*1200) : 400;
      var bd3=[{label:'Estimated Total (400–1600)',value:String(satTotal)}];
      Object.keys(areaScore).forEach(function(k){ bd3.push({label:k,value:String(areaScore[k])+'/800'}); });
      return { big:String(satTotal), label:'Estimated Digital SAT score (of 1600)', breakdown:bd3 };
    }
    function ieltsBand(pct){
      if(pct>=90)return 9; if(pct>=85)return 8.5; if(pct>=80)return 8; if(pct>=72)return 7.5;
      if(pct>=65)return 7; if(pct>=57)return 6.5; if(pct>=50)return 6; if(pct>=42)return 5.5;
      if(pct>=33)return 5; if(pct>=25)return 4.5; return 4;
    }
    function saveBest(conv, pct){
      var prev=null; try{ prev=JSON.parse(localStorage.getItem('tih_practice_best_'+exam)); }catch(e){}
      var cur={ pct:Math.round(pct), display:conv.big, at:new Date().toISOString() };
      if(!prev || cur.pct>prev.pct){ try{ localStorage.setItem('tih_practice_best_'+exam, JSON.stringify(cur)); }catch(e){} }
    }
    function pushActivity(conv, pct){
      try{
        if(typeof HubCloud!=='undefined' && HubCloud.isEnabled() && typeof HubDB!=='undefined'){
          var sess=HubDB.studentSession(); if(sess && sess.id){
            HubCloud.logActivity({ student_id:sess.id, course_id:exam, activity_type:'practice_test', detail:conv.big, score:Math.round(pct) });
          }
        }
      }catch(e){}
    }

    function renderExtras(container){
      if(!container) return;
      var h='';
      if((T.writing&&T.writing.length) || (T.speaking&&T.speaking.length)){
        h+='<h3 style="color:var(--navy);margin-bottom:.3rem;">✍️ Writing &amp; Speaking Practice</h3>'
          +'<p style="font-size:.85rem;color:var(--muted);margin-bottom:1rem;">These sections are not auto-scored. Practise your answer, then reveal a high-scoring model answer and self-check against the criteria.</p>';
      }
      (T.writing||[]).forEach(function(w,i){
        h+='<div class="prompt-box"><div class="p-q">'+esc(w.prompt)+'</div>';
        if(w.checklist){ h+='<div style="margin:.5rem 0;">'; w.checklist.forEach(function(c){ h+='<div class="check">'+esc(c)+'</div>'; }); h+='</div>'; }
        h+='<button class="reveal-btn" onclick="toggleModel(this)">Show model answer</button>';
        h+='<div class="model">'+esc(w.model)+'</div></div>';
      });
      (T.speaking||[]).forEach(function(s,i){
        h+='<div class="prompt-box"><div class="p-q">'+esc(s.prompt)+'</div>';
        if(s.tips){ h+='<div class="tips">💡 '+esc(s.tips)+'</div>'; }
        h+='<button class="reveal-btn" onclick="toggleModel(this)">Show model answer</button>';
        h+='<div class="model">'+esc(s.model)+'</div></div>';
      });
      container.innerHTML=h;
    }
    window.toggleModel=function(btn){
      var m=btn.nextElementSibling;
      var open=m.classList.toggle('show');
      btn.textContent = open?'Hide model answer':'Show model answer';
    };
  </script>
</body>
</html>
